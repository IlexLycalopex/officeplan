<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Desk, rota and room management for the modern workplace" />
    <title>OfficePlan</title>
    <!-- GitHub Pages SPA routing: restore URL encoded by 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = params[0].split('=')[1].replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].split('=')[1].replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null, null,
            l.pathname + path + query + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
