<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Desk, rota and room management for the modern workplace" />
    <title>OfficePlan</title>
    <!-- GitHub Pages SPA routing: restore URL encoded by 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var kv = {};
          l.search.slice(1).split('&').forEach(function (pair) {
            var i = pair.indexOf('=');
            kv[pair.slice(0, i)] = pair.slice(i + 1);
          });
          var path = (kv['p'] || '').replace(/~and~/g, '&');
          var query = kv['q'] ? '?' + kv['q'].replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, l.pathname + path + query + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
