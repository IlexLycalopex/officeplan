<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#2563EB"/>
  <!-- Floor plan icon: building outline -->
  <rect x="6" y="8" width="20" height="16" rx="1" stroke="white" stroke-width="2" fill="none"/>
  <!-- Internal wall -->
  <line x1="6" y1="16" x2="22" y2="16" stroke="white" stroke-width="1.5"/>
  <line x1="16" y1="16" x2="16" y2="24" stroke="white" stroke-width="1.5"/>
  <!-- Desk dots -->
  <rect x="9" y="11" width="3" height="2" rx="0.5" fill="white"/>
  <rect x="19" y="11" width="3" height="2" rx="0.5" fill="white"/>
  <rect x="9" y="19" width="3" height="2" rx="0.5" fill="white"/>
</svg>
