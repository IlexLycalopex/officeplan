<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Locustworks</title>
    <!--
      GitHub Pages SPA redirect.
      When GitHub Pages 404s on a client-side route (e.g. /locustworks/sign-in),
      this page encodes the full path into the query string and redirects to
      index.html. The script in index.html then restores the original URL via
      history.replaceState so the React Router picks up the correct route.

      pathSegmentsToKeep = 1 → keeps the first segment (/locustworks) as the base.
    -->
    <script>
      var l = window.location;
      var pathSegmentsToKeep = 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        '&_=' + Date.now() +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
